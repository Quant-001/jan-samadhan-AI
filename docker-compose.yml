services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jan_samadhan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-docker-key}
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      AXES_ENABLED: "False"
      DB_HOST: db
      DB_NAME: jan_samadhan
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: >
      sh -c "python -c \"import socket,time,sys; exec('for _ in range(30):'+chr(10)+' s=socket.socket(); ok=s.connect_ex((\\\"db\\\",5432))==0; s.close()'+chr(10)+' if ok: sys.exit(0)'+chr(10)+' time.sleep(1)'+chr(10)+'sys.exit(1)')\" &&
             python manage.py migrate &&
             python manage.py seed &&
             python manage.py train_local_ai_model &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  celery:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-docker-key}
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      AXES_ENABLED: "False"
      DB_HOST: db
      DB_NAME: jan_samadhan
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A config.celery worker -l info

  celery-beat:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-docker-key}
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      AXES_ENABLED: "False"
      DB_HOST: db
      DB_NAME: jan_samadhan
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  pgdata:
  media_files:
  frontend_node_modules:
